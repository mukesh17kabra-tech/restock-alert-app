# Shopify app configuration — used by the Shopify CLI (`shopify app dev`,
# `shopify app deploy`) if you manage this app with the CLI instead of (or
# alongside) the Partner Dashboard UI.

name = "Waitlyst"
client_id = "39e48daa1467bbda36709e1f72b0ac3f"
application_url = "https://restock-alert-app.vercel.app"
embedded = true

[access_scopes]
# Matches the scopes requested in lib/shopify.ts getInstallUrl()
# read_locations is required alongside read_inventory for the
# inventory_levels/update webhook topic to validate.
# Note: "write_webhooks" is not a valid Shopify scope — registering
# webhooks via the Admin API doesn't require a dedicated scope, and the
# declarative [[webhooks.subscriptions]] below handles registration
# automatically on deploy, so no webhook-related scope is needed at all.
scopes = "read_products,read_inventory,read_locations,read_themes,write_themes"

[auth]
redirect_urls = [
  "https://restock-alert-app.vercel.app/api/auth/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/api/webhooks/inventory"

  # Recommended additions (see README "Next steps to make this
  # production-ready") — uncomment once you build these handlers:
  # [[webhooks.subscriptions]]
  # topics = ["app/uninstalled"]
  # uri = "/api/webhooks/uninstalled"
  #
  # [[webhooks.subscriptions]]
  # topics = ["app_subscriptions/update"]
  # uri = "/api/webhooks/subscription-update"

# NOTE: app_proxy section removed entirely. The Shopify CLI treats an
# [app_proxy] header as "this feature is configured" even if its fields
# are commented out, and then requires url/subpath/prefix to be present.
# Since this app doesn't use an app proxy (the widget calls the Vercel
# domain directly via CORS), the whole section is simply omitted. If you
# ever want app-proxy routing, add the section back with all three fields
# filled in — never with just the header and no values.

[pos]
embedded = true

[build]
automatically_update_urls_on_dev = true
